# Production: mem9 + Caddy (host network).
# - mem9 → PostgreSQL 18 on host :5432 (set MEM9_DB_URL in .env)
# - caddy → :80 / :443 → reverse_proxy 127.0.0.1:8080

services:
  mem9:
    # Image is the mem9 binary; Aliyun namespace colinleefish/mem9 is not yet
    # publicly pullable from the server, so we publish under colinleefish/mypast.
    image: registry.cn-beijing.aliyuncs.com/colinleefish/mypast:8ec194c
    container_name: mem9-app
    command: ["serve"]
    network_mode: host
    env_file: .env
    environment:
      MEM9_ADDR: ":8080"
      GIN_MODE: release
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    container_name: mem9-caddy
    network_mode: host
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped
    depends_on:
      - mem9

volumes:
  caddy_data:
  caddy_config:
