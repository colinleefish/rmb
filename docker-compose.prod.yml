# Production: rmb + Caddy (host network).
# - rmb → PostgreSQL 18 on host :5432 (set RMB_DB_URL in .env)
# - caddy → :80 / :443 → reverse_proxy 127.0.0.1:8080

services:
  rmb:
    image: registry.cn-beijing.aliyuncs.com/colinleefish/rmb:60f0520
    container_name: rmb-app
    command: ["serve"]
    network_mode: host
    env_file: .env
    environment:
      RMB_ADDR: ":8080"
      GIN_MODE: release
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    container_name: rmb-caddy
    network_mode: host
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped
    depends_on:
      - rmb

volumes:
  caddy_data:
  caddy_config:
