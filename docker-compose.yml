services:
  postgres:
    image: pgvector/pgvector:pg18
    container_name: rmb-postgres
    environment:
      POSTGRES_USER: rmb
      POSTGRES_PASSWORD: rmb
      POSTGRES_DB: rmb_db
    ports:
      - "5433:5432"   # host 5433 to avoid clashing with local postgres@18
    volumes:
      # PG 18+ images expect the mount at /var/lib/postgresql (not .../data).
      - rmb_pg:/var/lib/postgresql
      - ./docker/init.sql:/docker-entrypoint-initdb.d/00-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rmb -d rmb_db"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  rmb:
    build: .
    container_name: rmb-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      RMB_DB_URL: postgres://rmb:rmb@postgres:5432/rmb_db?sslmode=disable
      RMB_ADDR: ":8080"
      GIN_MODE: release
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  rmb_pg:
