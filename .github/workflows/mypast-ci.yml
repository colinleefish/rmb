# Primary CI (replaces disabled ci.yml while clearing stuck GitHub queue).
name: mypast CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: self-hosted
    env:
      GOPROXY: https://goproxy.cn,direct
    steps:
      - uses: actions/checkout@v4
      - run: go version
      - run: go test ./...
      - run: go build -o /dev/null ./cmd/mypast
