# Run tests on pull requests and on pushes to main (self-hosted runner in Beijing).
name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: self-hosted
    env:
      GOPROXY: https://goproxy.cn,direct
    steps:
      - uses: actions/checkout@v4

      - name: Verify Go
        run: go version

      - name: Test
        run: go test ./...

      - name: Build
        run: go build -o /dev/null ./cmd/mypast
