<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MyPast — Observer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="shell">
    <header class="top">
      <div class="brand">
        <div class="brand-icon" aria-hidden="true">M</div>
        <div>
          <h1>MyPast Observer</h1>
          <p class="tagline">sessions → turns → atoms → scenes → memories</p>
        </div>
      </div>
      <button type="button" id="refresh-btn" class="btn btn-outline btn-sm">Refresh</button>
    </header>

    <aside class="nav" id="nav" aria-label="Main navigation"></aside>

    <main class="main">
      <div id="status" class="alert alert-destructive" hidden role="alert"></div>
      <div id="panel" class="panel"></div>
    </main>
  </div>

  <div id="drawer-root" class="drawer-root" hidden>
    <div class="drawer-backdrop" data-drawer-close></div>
    <aside class="drawer" role="dialog" aria-modal="true" aria-labelledby="drawer-title">
      <header class="drawer-head">
        <h3 id="drawer-title" class="drawer-title"></h3>
        <button type="button" class="btn btn-ghost btn-sm drawer-close" data-drawer-close aria-label="Close">✕</button>
      </header>
      <div id="drawer-body" class="drawer-body"></div>
    </aside>
  </div>

  <script src="app.js"></script>
</body>
</html>
